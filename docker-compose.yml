postgresimage: postgres:15
environment:
  POSTGRES_DB: wedlink
  POSTGRES_USER: wedlink_user
  POSTGRES_PASSWORD: changeme
ports:
  - "5432:5432"

---
version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://wedlink_user:changeme@db:5432/wedlink
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production

  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    command: npm run dev
